<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>an-dr: Confluence Axis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #172b4d;
      background: #fff;
      width: 300px;
      padding: 0 0 14px;
    }

    header {
      background: #0052cc;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 14px; font-weight: 700; }
    header p  { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      user-select: none;
    }

    .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 18px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .toggle input:checked + .toggle-track { background: #57d9a3; }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track::after { transform: translateX(16px); }

    section { padding: 14px 14px 0; }

    .section-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #6b778c;
      margin-bottom: 8px;
    }

    input[type="url"] {
      width: 100%;
      border: 2px solid #dfe1e6;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 13px;
      color: #172b4d;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #0052cc; }
    input::placeholder { color: #b3bac5; }

    .save-btn {
      margin-top: 8px;
      width: 100%;
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #0065ff; }

    body.disabled section { opacity: 0.4; pointer-events: none; }

    .status {
      margin-top: 6px;
      font-size: 11px;
      color: #00875a;
      min-height: 14px;
      text-align: right;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #172b4d;
      cursor: pointer;
      user-select: none;
    }

    .option-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #0052cc;
    }

    .option-row + .option-row { margin-top: 8px; }

    .select-row { justify-content: space-between; }

    .select-row select {
      border: 2px solid #dfe1e6;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      color: #172b4d;
      outline: none;
      cursor: pointer;
    }

    .select-row select:focus { border-color: #0052cc; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>an-dr: Confluence Axis</h1>
      <p>Jira titles in Confluence edit mode</p>
    </div>
    <label class="toggle-wrap">
      <span id="toggle-label">On</span>
      <span class="toggle">
        <input type="checkbox" id="enabled-toggle" checked />
        <span class="toggle-track"></span>
      </span>
    </label>
  </header>

  <section>
    <label class="section-label" for="jira-url">Jira Base URL</label>
    <input type="url" id="jira-url" placeholder="https://jira.se.axis.com" />
    <button class="save-btn" id="save-btn">Save</button>
    <div class="status" id="status"></div>
  </section>

  <section>
    <label class="section-label">Options</label>
    <label class="option-row">
      <input type="checkbox" id="show-status-toggle" />
      <span>Show status in badge</span>
    </label>
    <label class="option-row">
      <input type="checkbox" id="hide-on-cursor-toggle" />
      <span>Hide badge when cursor is on same line</span>
    </label>
    <label class="option-row">
      <input type="checkbox" id="show-link-status-toggle" />
      <span>Show status on Jira links</span>
    </label>
    <div class="option-row select-row">
      <span>Badge position</span>
      <select id="badge-pos-select">
        <option value="right">Right</option>
        <option value="left">Left</option>
        <option value="above">Above</option>
        <option value="below">Below</option>
      </select>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
